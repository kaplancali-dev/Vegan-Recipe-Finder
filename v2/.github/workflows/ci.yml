name: CI

on:
  push:
    branches: [main, v2-rewrite]
    paths: ['v2/**']
  pull_request:
    branches: [main]
    paths: ['v2/**']

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: v2/package-lock.json

      - run: npm ci
      - run: npm test
